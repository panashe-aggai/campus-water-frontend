name: mobile_app
description: Campus Water System
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.2

  # GPS & Location
  geolocator: ^13.0.1

  # Images (camera/gallery)
  image_picker: ^1.1.2

  # Open Google Maps navigation
  url_launcher: ^6.2.6

  # Maps (VERY IMPORTANT - keep this version stable)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # 🔥 ADD THIS (important for better tile caching + performance)
  flutter_map_tile_caching: ^9.0.0

  # 🔥 ADD THIS (for permissions handling cleanly)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true